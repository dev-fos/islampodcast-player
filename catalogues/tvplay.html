<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>TV Player - Easy Web TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Zhang Boheng">
    <meta name="keywords" content="iptv, movie, github, online tv, web tv, series tv...">
    <link href="https://vjs.zencdn.net/7.14.3/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="../css/main.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/ie8/1.1.2/videojs-ie8.min.js"></script>
    <style>
        /* Reset main.css conflicts */
        .player-container,
        .player-container * {
            float: none !important;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background-image: url("../images/bg.jpg");
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        /* Main Container */
        .player-container {
            width: 100%;
            height: 100vh;
            display: flex;
            position: relative;
        }
        
        /* Sidebar - Channel List */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            border-right: 2px solid rgba(163,0,27,0.5);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
            z-index: 100;
        }
        
        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }
        
        .sidebar-content {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .sidebar.collapsed .sidebar-content {
            opacity: 0;
            visibility: hidden;
        }
        
        /* Sidebar Header */
        .sidebar-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .sidebar-header h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            padding: 0;
        }
        
        .sidebar-header h3 i {
            color: #a3001b;
        }
        
        .sidebar-header .channel-count {
            background: rgba(163,0,27,0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #a3001b;
        }
        
        /* Sidebar Search */
        .sidebar-search {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-search input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border: 2px solid rgba(163,0,27,0.3);
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .sidebar-search input:focus {
            border-color: #a3001b;
            background: rgba(255,255,255,0.15);
        }
        
        .sidebar-search input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .sidebar-search i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        /* Channel List */
        .channel-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .channel-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .channel-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .channel-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 3px;
        }
        
        .channel-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .channel-item:hover {
            background: rgba(163,0,27,0.15);
            border-bottom-color: rgba(163,0,27,0.3);
        }
        
        .channel-item.active {
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom-color: #a3001b;
        }
        
        .channel-item .channel-icon {
            width: 32px;
            height: 32px;
            background: rgba(163,0,27,0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .channel-item .channel-icon i {
            color: #a3001b;
            font-size: 14px;
        }
        
        .channel-item .channel-name {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .channel-item:hover .channel-name {
            color: #a3001b;
        }
        
        .channel-item .favorite-btn {
            opacity: 0;
            transition: opacity 0.2s ease;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        .channel-item:hover .favorite-btn {
            opacity: 1;
        }
        
        .channel-item .favorite-btn.active {
            opacity: 1;
            color: #a3001b;
        }
        
        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.5);
            padding: 30px;
        }
        
        .loading-state i {
            font-size: 32px;
            color: #a3001b;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Main Content - Video Player */
        .main-content {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* Top Toolbar */
        .top-toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            z-index: 250;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        /* Top toolbar hidden state - use display */
        .top-toolbar.hidden {
            display: none;
        }
        
        
        /* When toolbar is hidden, video container fills the space */
        .top-toolbar.hidden ~ .video-container {
            padding-top: 0;
        }
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .toolbar-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .toolbar-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.05);
        }
        
        .toolbar-btn i {
            color: #a3001b;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        
        .toolbar-btn:hover i {
            color: #fff;
        }
        
        .toolbar-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toolbar-title i {
            color: #a3001b;
        }
        
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Link Input */
        .link-input-wrapper {
            position: relative;
            display: none;
        }
        
        .link-input-wrapper.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .link-input {
            width: 300px;
            padding: 10px 15px;
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .link-input:focus {
            border-color: #a3001b;
            background: rgba(0,0,0,0.9);
        }
        
        .link-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .play-link-btn {
            padding: 10px 15px;
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .play-link-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(163,0,27,0.4);
        }
        
        /* Video Player Container */
        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 20px 20px;
            position: relative;
            background: rgba(0,0,0,0.3);
        }
        
        .video-wrapper {
            width: 100%;
            max-width: 1200px;
            height: auto;
            aspect-ratio: 16 / 9;
            max-height: calc(100vh - 100px);
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: max-width 0.4s ease, max-height 0.4s ease;
        }
        
        /* 沉浸式模式 - 侧边栏收起时视频完全扩展 */
        .sidebar.collapsed ~ .main-content .video-container {
            padding: 60px 0 0 0;  /* 只保留顶部toolbar的空间 */
            background: #000;
        }
        
        .sidebar.collapsed ~ .main-content .video-wrapper {
            max-width: 100%;
            max-height: calc(100vh - 60px);
            width: 100%;
            height: calc(100vh - 60px);
            aspect-ratio: auto;
            border-radius: 0;
            box-shadow: none;
        }
        
        #video1 {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* Video.js container responsive */
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }
        
        /* Video.js Custom Styles - Hide big play button to avoid duplicate icons */
        .video-js .vjs-big-play-button {
            display: none !important;
        }
        
.video-js .vjs-control-bar {
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.9) 100%);
    height: 50px;
    position: absolute !important;
    bottom: 0 !important;
    left: 0 !important;
    right: 0 !important;
    opacity: 1;
    transition: opacity 0.3s ease;
}
        
        .video-js:hover .vjs-control-bar,
        .video-js.vjs-has-started.vjs-paused .vjs-control-bar {
            opacity: 1;
        }
        
        /* Keep control bar visible when user is interacting with it */
        .video-js .vjs-control-bar:hover {
            opacity: 1 !important;
        }
        
        .video-js .vjs-play-progress {
            background: #a3001b;
        }
        
        .video-js .vjs-slider {
            background: rgba(255,255,255,0.2);
        }
        
        .video-js .vjs-load-progress {
            background: rgba(163,0,27,0.3);
        }
        
        /* Right Side Action Buttons */
        .action-buttons {
            position: absolute;
            right: 20px;
            top: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 50;
        }
        
        .action-btn {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.1);
        }
        
        .action-btn i {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            transition: color 0.3s ease;
        }
        
        .action-btn:hover i {
            color: #fff;
        }
        
        /* Favorite Panel */
        .favorite-panel {
            position: absolute;
            right: 80px;
            top: 80px;
            width: 250px;
            max-height: 400px;
            background: rgba(0,0,0,0.9);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 15px;
            display: none;
            z-index: 60;
            overflow: hidden;
        }
        
        .favorite-panel.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .favorite-panel-header {
            padding: 15px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .favorite-panel-header h4 {
            color: #fff;
            font-size: 14px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .favorite-panel-header h4 i {
            color: #a3001b;
        }
        
        .favorite-panel-content {
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .favorite-panel-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .favorite-panel-content::-webkit-scrollbar-thumb {
            background: #a3001b;
            border-radius: 2px;
        }
        
        .favorite-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        
        .favorite-item:hover {
            background: rgba(163,0,27,0.2);
        }
        
        .favorite-item i {
            color: #a3001b;
            font-size: 14px;
        }
        
        .favorite-item span {
            color: #fff;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Toggle Sidebar Button */
        .toggle-sidebar {
            position: absolute;
            left: 280px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(163,0,27,0.5);
            border-left: none;
            border-radius: 0 10px 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 101;
        }
        
        .toggle-sidebar:hover {
            background: rgba(163,0,27,0.3);
        }
        
        .toggle-sidebar i {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        
        .sidebar.collapsed .toggle-sidebar {
            left: 0;
        }
        
        .sidebar.collapsed .toggle-sidebar i {
            transform: rotate(180deg);
        }
        
        /* No Channels Message */
        .no-channels {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.5);
            padding: 30px;
            text-align: center;
        }
        
        .no-channels i {
            font-size: 48px;
            color: rgba(163,0,27,0.3);
            margin-bottom: 20px;
        }
        
        /* Responsive Design */
        @media screen and (max-width: 1024px) {
            .sidebar {
                width: 220px;
            }
            
            .toggle-sidebar {
                left: 220px;
            }
            
            .link-input {
                width: 200px;
            }
            
            .favorite-panel {
                width: 200px;
            }
        }
        
        @media screen and (max-width: 768px) {
            .sidebar {
                width: 0;
                border-right: none;
            }
            
            .sidebar.show-mobile {
                width: 250px;
                border-right: 2px solid rgba(163,0,27,0.5);
                position: absolute;
                top: 0;
                z-index: 200;
            }
            
            .toggle-sidebar {
                left: 0;
            }
            
            .sidebar.show-mobile .toggle-sidebar {
                left: 250px;
            }
            
            .sidebar.collapsed .sidebar-content,
            .sidebar.show-mobile .sidebar-content {
                opacity: 1;
                visibility: visible;
            }
            
            .toolbar-title {
                font-size: 14px;
            }
            
            .link-input {
                width: 150px;
                font-size: 12px;
            }
            
            .action-buttons {
                right: 10px;
                top: 70px;
            }
            
            .action-btn {
                width: 35px;
                height: 35px;
            }
            
            .action-btn i {
                font-size: 14px;
            }
            
            .favorite-panel {
                right: 50px;
                width: 180px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .toolbar-btn {
                width: 35px;
                height: 35px;
            }
            
            .toolbar-btn i {
                font-size: 14px;
            }
            
            .link-input-wrapper.show {
                position: absolute;
                top: 60px;
                left: 10px;
                right: 10px;
                background: rgba(0,0,0,0.9);
                padding: 10px;
                border-radius: 10px;
            }
            
            .link-input-wrapper.show .link-input {
                width: 100%;
            }
        }
        
        /* Hide old elements */
        #left, #right, #div1, #control, #menuicon, #player, #prev, #github, #favorite, #channelist, #shuffleplay, #inputlink, .toggle {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="player-container">
        <!-- Sidebar - Channel List -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <!-- Sidebar Header -->
                <div class="sidebar-header">
                    <h3>
                        <i class="fas fa-tv"></i>
                        <span id="categoryTitle">Channels</span>
                        <span class="channel-count" id="channelCount">0</span>
                    </h3>
                </div>
                
                <!-- Sidebar Search -->
                <div class="sidebar-search" style="position: relative;">
                    <i class="fas fa-search"></i>
                    <input type="text" id="channelSearch" placeholder="Search channels...">
                </div>
                
                <!-- Channel List -->
                <div class="channel-list" id="channelList">
                    <div class="loading-state">
                        <i class="fas fa-spinner"></i>
                        <span>Loading channels...</span>
                    </div>
                </div>
            </div>
            
            <!-- Toggle Button -->
            <div class="toggle-sidebar" id="toggleSidebar">
                <i class="fas fa-chevron-left"></i>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Toolbar -->
            <div class="top-toolbar" id="top-toolbar">
                <div class="toolbar-left">
                    <div class="toolbar-btn" id="backBtn" title="Back">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <div class="toolbar-title">
                        <i class="fas fa-play-circle"></i>
                        <span id="currentChannel">Select a channel</span>
                    </div>
                </div>
                
                <div class="toolbar-right">
                    <div class="toolbar-btn" id="linkBtn" title="Play M3U8 Link">
                        <i class="fas fa-link"></i>
                    </div>
                    <div class="link-input-wrapper" id="linkInputWrapper">
                        <input type="text" class="link-input" id="linkInput" placeholder="Enter M3U8 URL...">
                        <button class="play-link-btn" id="playLinkBtn">Play</button>
                    </div>
                </div>
            </div>
            
            <!-- Video Player Container -->
            <div class="video-container">
                <div class="video-wrapper">
                    <video id="video1" class="video-js vjs-big-play-centered" controls preload="auto" autoplay="true" data-setup='{}'>
                        <source src="https://f8e7y4c6.ssl.hwcdn.net/andflixhd/index.m3u8" type="application/x-mpegURL" />
                        <p class="vjs-no-js">
                            To view this video please enable JavaScript, and consider upgrading to a web browser that
                            <a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a>
                        </p>
                    </video>
                </div>
            </div>
            
            <!-- Right Side Action Buttons -->
            <div class="action-buttons">
                <div class="action-btn" id="shuffleBtn" title="Random Play">
                    <i class="fas fa-random"></i>
                </div>
                <div class="action-btn" id="favoriteBtn" title="Favorites">
                    <i class="fas fa-heart"></i>
                </div>
                <div class="action-btn" id="githubBtn" title="GitHub">
                    <i class="fab fa-github"></i>
                </div>
            </div>
            
            <!-- Favorite Panel -->
            <div class="favorite-panel" id="favoritePanel">
                <div class="favorite-panel-header">
                    <h4>
                        <i class="fas fa-heart"></i>
                        Favorites
                    </h4>
                    <span style="color: rgba(255,255,255,0.5); font-size: 12px;" id="favCount">0</span>
                </div>
                <div class="favorite-panel-content" id="favoriteContent">
                    <div class="no-channels" style="padding: 20px;">
                        <i class="fas fa-heart-broken" style="font-size: 24px;"></i>
                        <span style="font-size: 12px;">No favorites yet</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://vjs.zencdn.net/7.14.3/video.min.js"></script>
    <script src="../js/tvplay.js"></script>
</body>

</html>
