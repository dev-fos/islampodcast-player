<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Manga Reader - Easy Web TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Zhang Boheng">
    <meta name="keywords" content="manga, comic, reader, online manga, web manga">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="../css/main.css" rel="stylesheet" />
    
    <style>
        /* Reset main.css conflicts */
        .reader-container,
        .reader-container * {
            float: none !important;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background-image: url("../images/bg.jpg");
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        /* Main Container */
        .reader-container {
            width: 100%;
            height: 100vh;
            display: flex;
            position: relative;
        }
        
        /* Sidebar - Chapter List */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            border-right: 2px solid rgba(163,0,27,0.5);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
            z-index: 100;
        }
        
        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }
        
        .sidebar-content {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .sidebar.collapsed .sidebar-content {
            opacity: 0;
            visibility: hidden;
        }
        
        /* Sidebar Header */
        .sidebar-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .sidebar-header h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            padding: 0;
        }
        
        .sidebar-header h3 i {
            color: #a3001b;
        }
        
        .sidebar-header .chapter-count {
            background: rgba(163,0,27,0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #a3001b;
        }
        
        /* Sidebar Search */
        .sidebar-search {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-search input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border: 2px solid rgba(163,0,27,0.3);
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .sidebar-search input:focus {
            border-color: #a3001b;
            background: rgba(255,255,255,0.15);
        }
        
        .sidebar-search input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .sidebar-search i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        /* Chapter List */
        .chapter-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .chapter-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .chapter-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .chapter-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 3px;
        }
        
        .chapter-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chapter-item:hover {
            background: rgba(163,0,27,0.15);
            border-bottom-color: rgba(163,0,27,0.3);
        }
        
        .chapter-item.active {
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom-color: #a3001b;
        }
        
        .chapter-item .chapter-icon {
            width: 32px;
            height: 32px;
            background: rgba(163,0,27,0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .chapter-item .chapter-icon i {
            color: #a3001b;
            font-size: 14px;
        }
        
        .chapter-item .chapter-name {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        .chapter-item:hover .chapter-name {
            color: #a3001b;
        }
        
        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.5);
            padding: 30px;
        }
        
        .loading-state i {
            font-size: 32px;
            color: #a3001b;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Main Content - Manga Reader */
        .main-content {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* Top Toolbar */
        .top-toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            z-index: 250;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        /* Top toolbar hidden state - use display */
        .top-toolbar.hidden {
            display: none;
        }
        
        /* Reader area expanded when toolbar hidden */
        .reader-wrapper.expanded {
            padding-top: 20px;
        }
        
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .toolbar-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .toolbar-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.05);
        }
        
        .toolbar-btn i {
            color: #a3001b;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        
        .toolbar-btn:hover i {
            color: #fff;
        }
        
        .toolbar-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
        }
        
        .toolbar-title i {
            color: #a3001b;
        }
        
        .toolbar-title span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Page Navigation Info */
        .page-info {
            background: rgba(163,0,27,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .page-info i {
            color: #a3001b;
        }
        
        /* Manga Reader Container */
        .reader-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 70px 20px 20px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
        }
        
        .reader-wrapper::-webkit-scrollbar {
            width: 8px;
        }
        
        .reader-wrapper::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .reader-wrapper::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 4px;
        }
        
        /* Manga Image */
        .manga-page {
            max-width: 100%;
            width: auto;
            max-height: calc(100vh - 100px);
            object-fit: contain;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .manga-page:hover {
            transform: scale(1.02);
        }
        
        .manga-page.loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            background: rgba(0,0,0,0.5);
        }
        
        /* Navigation Buttons */
        .nav-buttons {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 60;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid rgba(163,0,27,0.5);
        }
        
        .nav-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.1);
        }
        
        .nav-btn i {
            color: #a3001b;
            font-size: 18px;
            transition: color 0.3s ease;
        }
        
        .nav-btn:hover i {
            color: #fff;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .nav-btn:disabled:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(163,0,27,0.5);
            transform: none;
        }
        
        .nav-btn:disabled:hover i {
            color: #a3001b;
        }
        
        /* Right Side Action Buttons */
        .action-buttons {
            position: absolute;
            right: 20px;
            top: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 50;
        }
        
        .action-btn {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.1);
        }
        
        .action-btn i {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            transition: color 0.3s ease;
        }
        
        .action-btn:hover i {
            color: #fff;
        }
        
        /* Manga Info Panel */
        .manga-info-panel {
            position: absolute;
            left: 80px;
            top: 80px;
            width: 350px;
            max-height: 400px;
            background: rgba(0,0,0,0.95);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 15px;
            display: none;
            z-index: 60;
            overflow: hidden;
        }
        
        .manga-info-panel.show {
            display: block;
            animation: slideInLeft 0.3s ease;
        }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .manga-info-header {
            padding: 15px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .manga-info-header img {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid rgba(163,0,27,0.5);
        }
        
        .manga-info-header .info {
            flex: 1;
        }
        
        .manga-info-header h4 {
            color: #fff;
            font-size: 14px;
            margin: 0 0 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .manga-info-header h4 i {
            color: #a3001b;
        }
        
        .manga-info-header .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .manga-info-header .tag {
            background: rgba(163,0,27,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            color: rgba(255,255,255,0.7);
        }
        
        .manga-info-content {
            max-height: 280px;
            overflow-y: auto;
            padding: 15px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            line-height: 1.6;
        }
        
        .manga-info-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .manga-info-content::-webkit-scrollbar-thumb {
            background: #a3001b;
            border-radius: 2px;
        }
        
        /* Toggle Sidebar Button */
        .toggle-sidebar {
            position: absolute;
            left: 280px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(163,0,27,0.5);
            border-left: none;
            border-radius: 0 10px 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 101;
        }
        
        .toggle-sidebar:hover {
            background: rgba(163,0,27,0.3);
        }
        
        .toggle-sidebar i {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        
        .sidebar.collapsed .toggle-sidebar {
            left: 0;
        }
        
        .sidebar.collapsed .toggle-sidebar i {
            transform: rotate(180deg);
        }
        
        /* No Chapters Message */
        .no-chapters {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.5);
            padding: 30px;
            text-align: center;
        }
        
        .no-chapters i {
            font-size: 48px;
            color: rgba(163,0,27,0.3);
            margin-bottom: 20px;
        }
        
        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.5);
            padding: 30px;
        }
        
        .empty-state i {
            font-size: 64px;
            color: rgba(163,0,27,0.3);
            margin-bottom: 20px;
        }
        
        .empty-state p {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        /* Responsive Design */
        @media screen and (max-width: 1024px) {
            .sidebar {
                width: 220px;
            }
            
            .toggle-sidebar {
                left: 220px;
            }
            
            .manga-info-panel {
                width: 280px;
            }
        }
        
        @media screen and (max-width: 768px) {
            .sidebar {
                width: 0;
                border-right: none;
            }
            
            .sidebar.show-mobile {
                width: 250px;
                border-right: 2px solid rgba(163,0,27,0.5);
                position: absolute;
                z-index: 200;
            }
            
            .toggle-sidebar {
                left: 0;
            }
            
            .sidebar.show-mobile .toggle-sidebar {
                left: 250px;
            }
            
            .sidebar.collapsed .sidebar-content,
            .sidebar.show-mobile .sidebar-content {
                opacity: 1;
                visibility: visible;
            }
            
            .toolbar-title {
                font-size: 14px;
            }
            
            .nav-buttons {
                bottom: 20px;
                padding: 10px 20px;
            }
            
            .nav-btn {
                width: 40px;
                height: 40px;
            }
            
            .action-buttons {
                right: 10px;
                top: 70px;
            }
            
            .action-btn {
                width: 35px;
                height: 35px;
            }
            
            .action-btn i {
                font-size: 14px;
            }
            
            .manga-info-panel {
                left: 10px;
                width: 250px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .toolbar-btn {
                width: 35px;
                height: 35px;
            }
            
            .toolbar-btn i {
                font-size: 14px;
            }
            
            .page-info {
                padding: 5px 10px;
                font-size: 12px;
            }
        }
        
        /* Hide old elements */
        #left, #right, #div1, #control, #menuicon, #player, #prev, #github, #favorite, #channelist, #shuffleplay, #inputlink, .toggle, #readzone, #reader, #hiddens, #epdetail, #epcontent {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="reader-container">
        <!-- Sidebar - Chapter List -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <!-- Sidebar Header -->
                <div class="sidebar-header">
                    <h3>
                        <i class="fas fa-book-open"></i>
                        <span id="mangaTitle">Chapters</span>
                        <span class="chapter-count" id="chapterCount">0</span>
                    </h3>
                </div>
                
                <!-- Sidebar Search -->
                <div class="sidebar-search" style="position: relative;">
                    <i class="fas fa-search"></i>
                    <input type="text" id="chapterSearch" placeholder="Search chapters...">
                </div>
                
                <!-- Chapter List -->
                <div class="chapter-list" id="chapterList">
                    <div class="loading-state">
                        <i class="fas fa-spinner"></i>
                        <span>Loading chapters...</span>
                    </div>
                </div>
            </div>
            
            <!-- Toggle Button -->
            <div class="toggle-sidebar" id="toggleSidebar">
                <i class="fas fa-chevron-left"></i>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Toolbar -->
            <div class="top-toolbar" id="top-toolbar">
                <div class="toolbar-left">
                    <div class="toolbar-btn" id="backBtn" title="Back">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <div class="toolbar-title">
                        <i class="fas fa-book"></i>
                        <span id="currentChapter">Select a chapter</span>
                    </div>
                </div>
                
                <div class="toolbar-right">
                    <div class="page-info" id="pageInfo">
                        <i class="fas fa-image"></i>
                        <span id="pageText">Page 0 / 0</span>
                    </div>
                </div>
            </div>
            
            <!-- Manga Reader Container -->
            <div class="reader-wrapper" id="readerWrapper">
                <div class="empty-state" id="emptyState">
                    <i class="fas fa-book-open"></i>
                    <p>Select a chapter to start reading</p>
                </div>
            </div>
            
            <!-- Navigation Buttons -->
            <div class="nav-buttons" id="navButtons" style="display: none;">
                <div class="nav-btn" id="prevPageBtn" title="Previous Page">
                    <i class="fas fa-chevron-left"></i>
                </div>
                <div class="nav-btn" id="prevChapterBtn" title="Previous Chapter">
                    <i class="fas fa-step-backward"></i>
                </div>
                <div class="nav-btn" id="nextChapterBtn" title="Next Chapter">
                    <i class="fas fa-step-forward"></i>
                </div>
                <div class="nav-btn" id="nextPageBtn" title="Next Page">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
            
            <!-- Right Side Action Buttons -->
            <div class="action-buttons">
                <div class="action-btn" id="scrollModeBtn" title="Random Chapter">
                    <i class="fas fa-random"></i>
                </div>
                <div class="action-btn" id="infoBtn" title="Manga Info">
                    <i class="fas fa-info-circle"></i>
                </div>
                <div class="action-btn" id="fullscreenBtn" title="Fullscreen">
                    <i class="fas fa-expand"></i>
                </div>
                <div class="action-btn" id="githubBtn" title="GitHub">
                    <i class="fab fa-github"></i>
                </div>
            </div>
            
            <!-- Manga Info Panel -->
            <div class="manga-info-panel" id="mangaInfoPanel">
                <div class="manga-info-header">
                    <img id="mangaCover" src="../images/noimage.jpeg" alt="Cover">
                    <div class="info">
                        <h4>
                            <i class="fas fa-book"></i>
                            <span id="mangaInfoTitle">Manga Title</span>
                        </h4>
                        <div class="tags" id="mangaTags">
                            <span class="tag">Loading...</span>
                        </div>
                    </div>
                </div>
                <div class="manga-info-content" id="mangaInfoContent">
                    <p>Loading manga information...</p>
                </div>
            </div>
        </main>
    </div>
    
    <script src="../js/manga.js"></script>
</body>

</html>
