<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Radio Player - Easy Web TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Zhang Boheng">
    <meta name="keywords" content="iptv, movie, github, online tv, web tv, series tv, radio, music">
    <link href="https://vjs.zencdn.net/7.14.3/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="../css/main.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/ie8/1.1.2/videojs-ie8.min.js"></script>
    <script src="../js/jquery-3.6.0.min.js"></script>
    <style>
        /* Reset main.css conflicts */
        .player-container,
        .player-container * {
            float: none !important;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background-image: url("../images/bg.jpg");
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        /* Main Container */
        .player-container {
            width: 100%;
            height: 100vh;
            display: flex;
            position: relative;
        }
        
        /* Sidebar - Station List */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            border-right: 2px solid rgba(163,0,27,0.5);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
            z-index: 100;
        }
        
        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }
        
        .sidebar-content {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .sidebar.collapsed .sidebar-content {
            opacity: 0;
            visibility: hidden;
        }
        
        /* Sidebar Header */
        .sidebar-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .sidebar-header h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            padding: 0;
        }
        
        .sidebar-header h3 i {
            color: #a3001b;
        }
        
        .sidebar-header .station-count {
            background: rgba(163,0,27,0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #a3001b;
        }
        
        /* Sidebar Search */
        .sidebar-search {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        
        .sidebar-search input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border: 2px solid rgba(163,0,27,0.3);
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .sidebar-search input:focus {
            border-color: #a3001b;
            background: rgba(255,255,255,0.15);
        }
        
        .sidebar-search input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .sidebar-search i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        /* Station List */
        .station-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .station-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .station-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .station-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 3px;
        }
        
        .station-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .station-item:hover {
            background: rgba(163,0,27,0.15);
            border-bottom-color: rgba(163,0,27,0.3);
        }
        
        .station-item.active {
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom-color: #a3001b;
        }
        
        .station-item .station-icon {
            width: 32px;
            height: 32px;
            background: rgba(163,0,27,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .station-item .station-icon i {
            color: #a3001b;
            font-size: 14px;
        }
        
        .station-item .station-name {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        .station-item:hover .station-name {
            color: #a3001b;
        }
        
        .station-item .favorite-btn {
            opacity: 0;
            transition: opacity 0.2s ease;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        .station-item:hover .favorite-btn {
            opacity: 1;
        }
        
        .station-item .favorite-btn.active {
            opacity: 1;
            color: #a3001b;
        }
        
        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.5);
            padding: 30px;
        }
        
        .loading-state i {
            font-size: 32px;
            color: #a3001b;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Main Content - Audio Player */
        .main-content {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* Top Toolbar */
        .top-toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            z-index: 250;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        /* Top toolbar hidden state - use display */
        .top-toolbar.hidden {
            display: none;
        }
        
        
        /* When toolbar is hidden, audio container fills the space */
        .top-toolbar.hidden ~ .audio-container {
            padding-top: 40px;
        }
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .toolbar-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .toolbar-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.05);
        }
        
        .toolbar-btn i {
            color: #a3001b;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        
        .toolbar-btn:hover i {
            color: #fff;
        }
        
        .toolbar-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toolbar-title i {
            color: #a3001b;
        }
        
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Link Input */
        .link-input-wrapper {
            position: relative;
            display: none;
        }
        
        .link-input-wrapper.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .link-input {
            width: 300px;
            padding: 10px 15px;
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .link-input:focus {
            border-color: #a3001b;
            background: rgba(0,0,0,0.9);
        }
        
        .link-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .play-link-btn {
            padding: 10px 15px;
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .play-link-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(163,0,27,0.4);
        }
        
        /* Audio Player Container */
        .audio-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px 40px;
            position: relative;
        }
        
        /* Radio Visualizer Animation */
        .radio-visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
            height: 100px;
        }
        
        .radio-visualizer .bar {
            width: 8px;
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 4px;
            animation: visualize 1s ease-in-out infinite;
        }
        
        .radio-visualizer .bar:nth-child(1) { height: 20px; animation-delay: 0s; }
        .radio-visualizer .bar:nth-child(2) { height: 40px; animation-delay: 0.1s; }
        .radio-visualizer .bar:nth-child(3) { height: 60px; animation-delay: 0.2s; }
        .radio-visualizer .bar:nth-child(4) { height: 80px; animation-delay: 0.3s; }
        .radio-visualizer .bar:nth-child(5) { height: 100px; animation-delay: 0.4s; }
        .radio-visualizer .bar:nth-child(6) { height: 80px; animation-delay: 0.5s; }
        .radio-visualizer .bar:nth-child(7) { height: 60px; animation-delay: 0.6s; }
        .radio-visualizer .bar:nth-child(8) { height: 40px; animation-delay: 0.7s; }
        .radio-visualizer .bar:nth-child(9) { height: 20px; animation-delay: 0.8s; }
        
        @keyframes visualize {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }
        
        .radio-visualizer.paused .bar {
            animation-play-state: paused;
        }
        
        /* Station Info */
        .station-info {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .station-info .station-title {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .station-info .station-country {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .station-info .station-country i {
            color: #a3001b;
        }
        
        /* Video Wrapper (hidden, for audio playback) */
        .video-wrapper {
            width: 100%;
            max-width: 800px;
            position: relative;
        }
        
        #video1 {
            width: 100%;
            height: auto;
        }
        
        /* Video.js Custom Styles for Audio */
        .video-js.audio-player {
            width: 100%;
            height: 60px;
        }
        
        .video-js.audio-player .vjs-big-play-button {
            display: none;
        }
        
        .video-js.audio-player .vjs-control-bar {
            background: rgba(0,0,0,0.8);
            border-radius: 30px;
            padding: 0 20px;
            height: 60px;
        }
        
        .video-js.audio-player .vjs-play-progress {
            background: #a3001b;
        }
        
        .video-js.audio-player .vjs-slider {
            background: rgba(255,255,255,0.2);
        }
        
        .video-js.audio-player .vjs-load-progress {
            background: rgba(163,0,27,0.3);
        }
        
        /* Right Side Action Buttons */
        .action-buttons {
            position: absolute;
            right: 20px;
            top: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 50;
        }
        
        .action-btn {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.1);
        }
        
        .action-btn i {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            transition: color 0.3s ease;
        }
        
        .action-btn:hover i {
            color: #fff;
        }
        
        /* Favorite Panel */
        .favorite-panel {
            position: absolute;
            right: 80px;
            top: 80px;
            width: 250px;
            max-height: 400px;
            background: rgba(0,0,0,0.9);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 15px;
            display: none;
            z-index: 60;
            overflow: hidden;
        }
        
        .favorite-panel.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .favorite-panel-header {
            padding: 15px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .favorite-panel-header h4 {
            color: #fff;
            font-size: 14px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .favorite-panel-header h4 i {
            color: #a3001b;
        }
        
        .favorite-panel-content {
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .favorite-panel-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .favorite-panel-content::-webkit-scrollbar-thumb {
            background: #a3001b;
            border-radius: 2px;
        }
        
        .favorite-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        
        .favorite-item:hover {
            background: rgba(163,0,27,0.2);
        }
        
        .favorite-item i.fa-heart {
            color: #a3001b;
            font-size: 14px;
        }
        
        .favorite-item span {
            color: #fff;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        .favorite-item .delete-btn {
            opacity: 0;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            transition: opacity 0.2s ease, color 0.2s ease;
            cursor: pointer;
        }
        
        .favorite-item:hover .delete-btn {
            opacity: 1;
        }
        
        .favorite-item .delete-btn:hover {
            color: #ff4444;
        }
        
        /* Toggle Sidebar Button */
        .toggle-sidebar {
            position: absolute;
            left: 280px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(163,0,27,0.5);
            border-left: none;
            border-radius: 0 10px 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 101;
        }
        
        .toggle-sidebar:hover {
            background: rgba(163,0,27,0.3);
        }
        
        .toggle-sidebar i {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        
        .sidebar.collapsed .toggle-sidebar {
            left: 0;
        }
        
        .sidebar.collapsed .toggle-sidebar i {
            transform: rotate(180deg);
        }
        
        /* No Stations Message */
        .no-stations {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.5);
            padding: 30px;
            text-align: center;
        }
        
        .no-stations i {
            font-size: 48px;
            color: rgba(163,0,27,0.3);
            margin-bottom: 20px;
        }
        
        /* Responsive Design */
        @media screen and (max-width: 1024px) {
            .sidebar {
                width: 220px;
            }
            
            .toggle-sidebar {
                left: 220px;
            }
            
            .link-input {
                width: 200px;
            }
            
            .favorite-panel {
                width: 200px;
            }
            
            .radio-visualizer {
                height: 80px;
            }
            
            .radio-visualizer .bar:nth-child(5) { height: 80px; }
        }
        
        @media screen and (max-width: 768px) {
            .sidebar {
                width: 0;
                border-right: none;
            }
            
            .sidebar.show-mobile {
                width: 250px;
                border-right: 2px solid rgba(163,0,27,0.5);
                position: absolute;
                z-index: 200;
            }
            
            .toggle-sidebar {
                left: 0;
            }
            
            .sidebar.show-mobile .toggle-sidebar {
                left: 250px;
            }
            
            .sidebar.collapsed .sidebar-content,
            .sidebar.show-mobile .sidebar-content {
                opacity: 1;
                visibility: visible;
            }
            
            .toolbar-title {
                font-size: 14px;
            }
            
            .link-input {
                width: 150px;
                font-size: 12px;
            }
            
            .action-buttons {
                right: 10px;
                top: 70px;
            }
            
            .action-btn {
                width: 35px;
                height: 35px;
            }
            
            .action-btn i {
                font-size: 14px;
            }
            
            .favorite-panel {
                right: 50px;
                width: 180px;
            }
            
            .audio-container {
                padding: 70px 20px 20px;
            }
            
            .radio-visualizer {
                height: 60px;
                margin-bottom: 20px;
            }
            
            .radio-visualizer .bar {
                width: 6px;
            }
            
            .station-info .station-title {
                font-size: 18px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .toolbar-btn {
                width: 35px;
                height: 35px;
            }
            
            .toolbar-btn i {
                font-size: 14px;
            }
            
            .link-input-wrapper.show {
                position: absolute;
                top: 60px;
                left: 10px;
                right: 10px;
                background: rgba(0,0,0,0.9);
                padding: 10px;
                border-radius: 10px;
            }
            
            .link-input-wrapper.show .link-input {
                width: 100%;
            }
            
            .radio-visualizer {
                height: 40px;
            }
            
            .radio-visualizer .bar {
                width: 4px;
            }
        }
        
        /* Hide old elements */
        #left, #right, #div1, #control, #menuicon, #player, #prev, #github, #favorite, #channelist, #shuffleplay, #inputlink, .toggle {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="player-container">
        <!-- Sidebar - Station List -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <!-- Sidebar Header -->
                <div class="sidebar-header">
                    <h3>
                        <i class="fas fa-broadcast-tower"></i>
                        <span id="categoryTitle">Stations</span>
                        <span class="station-count" id="stationCount">0</span>
                    </h3>
                </div>
                
                <!-- Sidebar Search -->
                <div class="sidebar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="stationSearch" placeholder="Search stations...">
                </div>
                
                <!-- Station List -->
                <div class="station-list" id="stationList">
                    <div class="loading-state">
                        <i class="fas fa-spinner"></i>
                        <span>Loading stations...</span>
                    </div>
                </div>
            </div>
            
            <!-- Toggle Button -->
            <div class="toggle-sidebar" id="toggleSidebar">
                <i class="fas fa-chevron-left"></i>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Toolbar -->
            <div class="top-toolbar" id="top-toolbar">
                <div class="toolbar-left">
                    <div class="toolbar-btn" id="backBtn" title="Back">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <div class="toolbar-title">
                        <i class="fas fa-radio"></i>
                        <span id="currentStation">Select a station</span>
                    </div>
                </div>
                
                <div class="toolbar-right">
                    <div class="toolbar-btn" id="linkBtn" title="Play Audio Link">
                        <i class="fas fa-link"></i>
                    </div>
                    <div class="link-input-wrapper" id="linkInputWrapper">
                        <input type="text" class="link-input" id="linkInput" placeholder="Enter audio URL...">
                        <button class="play-link-btn" id="playLinkBtn">Play</button>
                    </div>
                </div>
            </div>
            
            <!-- Audio Player Container -->
            <div class="audio-container">
                <!-- Radio Visualizer -->
                <div class="radio-visualizer paused" id="radioVisualizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
