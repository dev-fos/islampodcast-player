<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Novel Reader - Easy Web TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Zhang Boheng">
    <meta name="keywords" content="iptv, movie, github, online tv, web tv, series tv...">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="../css/main.css" rel="stylesheet" />
    
    <style>
        /* Reset main.css conflicts */
        .reader-container,
        .reader-container * {
            float: none !important;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            min-height: 100vh;
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow: hidden;
        }
        
        /* Main Container */
        .reader-container {
            width: 100%;
            height: 100vh;
            display: flex;
            position: relative;
        }
        
        /* Sidebar - Chapter List */
        .sidebar {
            width: 300px;
            height: 100vh;
            background: rgba(26, 26, 46, 0.98);
            border-right: 2px solid rgba(163,0,27,0.5);
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease, border 0.3s ease;
            position: relative;
            z-index: 100;
        }
        
        .sidebar.collapsed {
            width: 0 !important;
            border-right: none !important;
            min-width: 0;
        }
        
        .sidebar-content {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .sidebar.collapsed .sidebar-content {
            opacity: 0;
            visibility: hidden;
        }
        
        /* Sidebar Header */
        .sidebar-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
        }
        
        .sidebar-header h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            padding: 0;
        }
        
        .sidebar-header h3 i {
            color: #a3001b;
        }
        
        .chapter-count {
            background: rgba(163,0,27,0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #a3001b;
        }
        
        /* Sidebar Search */
        .sidebar-search {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        
        .sidebar-search input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border: 2px solid rgba(163,0,27,0.3);
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .sidebar-search input:focus {
            border-color: #a3001b;
            background: rgba(255,255,255,0.15);
        }
        
        .sidebar-search input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .sidebar-search i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        /* Chapter List */
        .chapter-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .chapter-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .chapter-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .chapter-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 3px;
        }
        
        .chapter-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chapter-item:hover {
            background: rgba(163,0,27,0.15);
            border-bottom-color: rgba(163,0,27,0.3);
        }
        
        .chapter-item.active {
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom-color: #a3001b;
        }
        
        .chapter-item .chapter-icon {
            width: 32px;
            height: 32px;
            background: rgba(163,0,27,0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .chapter-item .chapter-icon i {
            color: #a3001b;
            font-size: 14px;
        }
        
        .chapter-item .chapter-name {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        .chapter-item:hover .chapter-name {
            color: #a3001b;
        }
        
        .chapter-item .fav-btn {
            opacity: 0;
            transition: opacity 0.2s ease;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }
        
        .chapter-item:hover .fav-btn {
            opacity: 1;
        }
        
        .chapter-item .fav-btn.active {
            opacity: 1;
            color: #a3001b;
        }
        
        .chapter-item .fav-btn:hover {
            color: #a3001b;
            transform: scale(1.2);
        }
        
        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.5);
            padding: 30px;
        }
        
        .loading-state i {
            font-size: 32px;
            color: #a3001b;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Main Content - Reader */
        .main-content {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        .main-content.expanded {
            margin-left: 0;
        }
        
        /* Top toolbar hidden state - use display */
        .top-toolbar.hidden {
            display: none;
        }
        
        /* Reader area expanded when toolbar hidden */
        .reader-area.expanded {
            padding-top: 0;
        }
        
        /* Top Toolbar */
        .top-toolbar {
            height: 60px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid rgba(163,0,27,0.3);
            z-index: 250;
        }
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .toolbar-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .toolbar-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.05);
        }
        
        .toolbar-btn i {
            color: #a3001b;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        
        .toolbar-btn:hover i {
            color: #fff;
        }
        
        .toolbar-title {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
        }
        
        .toolbar-title i {
            color: #a3001b;
        }
        
        .toolbar-title span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Reader Area */
        .reader-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px 0;
            background: #16213e;
        }
        
        .reader-area::-webkit-scrollbar {
            width: 8px;
        }
        
        .reader-area::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .reader-area::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 4px;
        }
        
        /* Reader Content */
        .reader-content-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 40px;
        }
        
        .chapter-title {
            color: #fff;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(163,0,27,0.5);
            text-align: center;
        }
        
        .reader-content {
            color: #e0e0e0;
            font-size: 18px;
            line-height: 1.9;
            text-align: justify;
            word-break: break-word;
        }
        
        .reader-content p {
            margin-bottom: 1.5em;
            text-indent: 2em;
        }
        
        .reader-content h1, .reader-content h2, .reader-content h3 {
            color: #fff;
            margin: 1.5em 0 1em;
        }
        
        .reader-content img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        /* Reader Navigation */
        .reader-nav {
            position: fixed;
            bottom: 0;
            left: 300px;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(26, 26, 46, 0.98);
            border-top: 1px solid rgba(163,0,27,0.3);
            z-index: 100;
            transition: left 0.3s ease;
        }
        
        .sidebar.collapsed ~ .main-content .reader-nav {
            left: 0;
        }
        
        .nav-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border: none;
            border-radius: 25px;
            color: #fff !important;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex !important;
            flex-direction: row !important;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            position: relative;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(163,0,27,0.4);
        }
        
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.3) !important;
        }
        
        .nav-btn:disabled i {
            color: rgba(255,255,255,0.3);
        }
        
        .nav-btn i {
            font-size: 14px;
        }
        
        /* Right Side Action Buttons */
        .action-buttons {
            position: fixed;
            right: 20px;
            top: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 50;
        }
        
        .action-btn {
            width: 45px;
            height: 45px;
            background: rgba(26, 26, 46, 0.9);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.1);
        }
        
        .action-btn i {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            transition: color 0.3s ease;
        }
        
        .action-btn:hover i {
            color: #fff;
        }
        
        /* Favorite Panel */
        .favorite-panel {
            position: fixed;
            right: 80px;
            top: 80px;
            width: 280px;
            max-height: 400px;
            background: rgba(26, 26, 46, 0.98);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 15px;
            display: none;
            z-index: 60;
            overflow: hidden;
        }
        
        .favorite-panel.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .favorite-panel-header {
            padding: 15px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .favorite-panel-header h4 {
            color: #fff;
            font-size: 14px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .favorite-panel-header h4 i {
            color: #a3001b;
        }
        
        .favorite-panel-content {
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .favorite-panel-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .favorite-panel-content::-webkit-scrollbar-thumb {
            background: #a3001b;
            border-radius: 2px;
        }
        
        .fav-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        
        .fav-item:hover {
            background: rgba(163,0,27,0.2);
        }
        
        .fav-item i {
            color: #a3001b;
            font-size: 14px;
        }
        
        .fav-item-name {
            color: #fff;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        .fav-item-remove {
            opacity: 0;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            background: none;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        
        .fav-item:hover .fav-item-remove {
            opacity: 1;
        }
        
        .no-favorites {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
        }
        
        .no-favorites i {
            font-size: 32px;
            color: rgba(163,0,27,0.3);
            margin-bottom: 10px;
        }
        
        /* Novel Info Panel */
        .novel-info {
            display: none;
            position: fixed;
            left: 80px;
            top: 80px;
            width: 350px;
            max-height: 400px;
            background: rgba(26, 26, 46, 0.98);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 15px;
            z-index: 60;
            overflow: hidden;
        }
        
        .novel-info.show {
            display: block;
            animation: slideInLeft 0.3s ease;
        }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .novel-info-header {
            padding: 15px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
        }
        
        .novel-info-header h4 {
            color: #fff;
            font-size: 14px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .novel-info-header h4 i {
            color: #a3001b;
        }
        
        .novel-info-content {
            max-height: 350px;
            overflow-y: auto;
            padding: 15px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        /* Toggle Sidebar Button */
        .toggle-sidebar {
            position: absolute;
            left: 300px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: rgba(26, 26, 46, 0.9);
            border: 2px solid rgba(163,0,27,0.5);
            border-left: none;
            border-radius: 0 10px 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 101;
        }
        
        .toggle-sidebar:hover {
            background: rgba(163,0,27,0.3);
        }
        
        .toggle-sidebar i {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        
        .sidebar.collapsed .toggle-sidebar {
            left: 0;
        }
        
        .sidebar.collapsed .toggle-sidebar i {
            transform: rotate(180deg);
        }
        
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .loading-overlay.hidden {
            display: none;
        }
        
        .loading-overlay i {
            font-size: 48px;
            color: #a3001b;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        .loading-overlay span {
            color: #fff;
            font-size: 16px;
        }
        
        /* Toast Container */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .toast {
            padding: 15px 20px;
            background: rgba(26, 26, 46, 0.98);
            border: 2px solid #a3001b;
            border-radius: 10px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success {
            border-color: #28a745;
        }
        
        .toast.success i {
            color: #28a745;
        }
        
        .toast.error {
            border-color: #dc3545;
        }
        
        .toast.error i {
            color: #dc3545;
        }
        
        .toast.warning {
            border-color: #ffc107;
        }
        
        .toast.warning i {
            color: #ffc107;
        }
        
        .toast-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            padding: 0;
            margin-left: 10px;
        }
        
        .toast-close:hover {
            color: #fff;
        }
        
        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal-overlay.hidden {
            display: none;
        }
        
        .modal {
            background: rgba(26, 26, 46, 0.98);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 15px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
        }
        
        .modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .modal-icon {
            width: 50px;
            height: 50px;
            background: rgba(163,0,27,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-icon.warning i {
            color: #ffc107;
            font-size: 24px;
        }
        
        .modal-icon.error i {
            color: #dc3545;
            font-size: 24px;
        }
        
        .modal-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .modal-body {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .modal-btn.cancel {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
        }
        
        .modal-btn.cancel:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .modal-btn.confirm {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border: none;
            color: #fff;
        }
        
        .modal-btn.confirm:hover {
            transform: scale(1.05);
        }
        
        /* Responsive Design */
        @media screen and (max-width: 1024px) {
            .sidebar {
                width: 250px;
            }
            
            .toggle-sidebar {
                left: 250px;
            }
            
            .reader-content-wrapper {
                padding: 20px 30px;
            }
            
            .reader-content {
                font-size: 16px;
            }
        }
        
        @media screen and (max-width: 768px) {
            .sidebar {
                width: 0;
                border-right: none;
            }
            
            .sidebar.show-mobile {
                width: 280px;
                border-right: 2px solid rgba(163,0,27,0.5);
                position: absolute;
                z-index: 200;
            }
            
            /* Mobile: reader-nav full width */
            .reader-nav {
                left: 0;
            }
            
            .toggle-sidebar {
                left: 0;
            }
            
            .sidebar.show-mobile .toggle-sidebar {
                left: 280px;
            }
            
            .sidebar.collapsed .sidebar-content,
            .sidebar.show-mobile .sidebar-content {
                opacity: 1;
                visibility: visible;
            }
            
            .toolbar-title {
                font-size: 14px;
            }
            
            .reader-content-wrapper {
                padding: 15px 20px;
            }
            
            .reader-content {
                font-size: 15px;
                line-height: 1.8;
            }
            
            .chapter-title {
                font-size: 22px;
            }
            
            .action-buttons {
                right: 10px;
                top: 70px;
            }
            
            .action-btn {
                width: 35px;
                height: 35px;
            }
            
            .action-btn i {
                font-size: 14px;
            }
            
            .favorite-panel {
                right: 50px;
                width: 220px;
            }
            
            .novel-info {
                left: 10px;
                width: 280px;
            }
            
            .nav-btn {
                padding: 10px 20px;
                font-size: 13px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .toolbar-btn {
                width: 35px;
                height: 35px;
            }
            
            .toolbar-btn i {
                font-size: 14px;
            }
            
            .reader-content-wrapper {
                padding: 10px 15px;
            }
            
            .reader-content {
                font-size: 14px;
            }
            
            .chapter-title {
                font-size: 18px;
            }
            
            .reader-nav {
                padding: 15px 20px;
            }
            
            .nav-btn {
                padding: 8px 15px;
                font-size: 12px;
            }
        }
        
        /* Font Settings Panel */
        .font-panel {
            position: fixed;
            right: 80px;
            top: 70px;
            width: 220px;
            background: rgba(26, 26, 46, 0.98);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 15px;
            display: none;
            z-index: 70;
            overflow: hidden;
        }
        
        .font-panel.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        .font-panel-header {
            padding: 12px 15px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
        }
        
        .font-panel-header h4 {
            color: #fff;
            font-size: 13px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .font-panel-header h4 i {
            color: #a3001b;
        }
        
        .font-panel-content {
            padding: 15px;
        }
        
        .font-setting {
            margin-bottom: 15px;
        }
        
        .font-setting:last-child {
            margin-bottom: 0;
        }
        
        .font-setting label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .font-size-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .font-size-btn {
            width: 32px;
            height: 32px;
            background: rgba(163,0,27,0.2);
            border: 1px solid rgba(163,0,27,0.5);
            border-radius: 8px;
            color: #a3001b;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .font-size-btn:hover {
            background: rgba(163,0,27,0.4);
        }
        
        #currentFontSize {
            color: #fff;
            font-size: 14px;
            min-width: 40px;
            text-align: center;
        }
        
        #fontFamily {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(163,0,27,0.5);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
        
        #fontFamily:focus {
            border-color: #a3001b;
        }
        
        #fontFamily option {
            background: #1a1a2e;
            color: #fff;
        }
        
        /* Hide old elements */
        #left, #right, #div1, #control, #menuicon, #player, #prev, #github, #favorite, #channelist, #shuffleplay, #inputlink, .toggle {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="reader-container">
        <!-- Sidebar - Chapter List -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <!-- Sidebar Header -->
                <div class="sidebar-header">
                    <h3>
                        <i class="fas fa-list"></i>
                        <span id="novelTitle">Chapters</span>
                        <span class="chapter-count" id="chapterCount">0</span>
                    </h3>
                </div>
                
                <!-- Sidebar Search -->
                <div class="sidebar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="chapterSearch" placeholder="Search chapters...">
                </div>
                
                <!-- Chapter List -->
                <div class="chapter-list" id="chapterList">
                    <div class="loading-state">
                        <i class="fas fa-spinner"></i>
                        <span>Loading chapters...</span>
                    </div>
                </div>
            </div>
            
            <!-- Toggle Button -->
            <div class="toggle-sidebar" id="toggleSidebar">
                <i class="fas fa-chevron-left"></i>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- Top Toolbar -->
            <div class="top-toolbar">
                <div class="toolbar-left">
                    <div class="toolbar-btn" id="backBtn" title="Back">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <div class="toolbar-title">
                        <i class="fas fa-book-open"></i>
                        <span id="chapterTitle">Select a chapter</span>
                    </div>
                </div>
                
                <div class="toolbar-right">
                    <div class="toolbar-btn" id="fontBtn" title="Font Settings">
                        <i class="fas fa-font"></i>
                    </div>
                    <!-- Font Settings Panel -->
                    <div class="font-panel" id="fontPanel">
                        <div class="font-panel-header">
                            <h4>
                                <i class="fas fa-font"></i>
                                Font Settings
                            </h4>
                        </div>
                        <div class="font-panel-content">
                            <div class="font-setting">
                                <label>Font Size</label>
                                <div class="font-size-controls">
                                    <button class="font-size-btn" id="fontDecrease">-</button>
                                    <span id="currentFontSize">18px</span>
                                    <button class="font-size-btn" id="fontIncrease">+</button>
                                </div>
                            </div>
                            <div class="font-setting">
                                <label>Font Family</label>
                                <select id="fontFamily">
                                    <option value="Georgia, 'Times New Roman', serif">Georgia (Serif)</option>
                                    <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Segoe UI (Sans)</option>
                                    <option value="Arial, sans-serif">Arial</option>
                                    <option value="'Courier New', monospace">Courier New</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Reader Area -->
            <div class="reader-area" id="readerArea">
                <div class="reader-content-wrapper">
                    <h1 class="chapter-title" id="chapterTitleDisplay">Loading...</h1>
                    <div class="reader-content" id="readerContent">
                        <p>Please select a chapter from the sidebar to start reading.</p>
                    </div>
                </div>
            </div>
            
            <!-- Reader Navigation -->
            <div class="reader-nav" id="readerNav" style="display: none;">
                <button class="nav-btn" id="prevChapter" disabled>
                    <i class="fas fa-chevron-left"></i>
                    Previous
                </button>
                <button class="nav-btn" id="nextChapter" disabled>
                    Next
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </main>
        
        <!-- Right Side Action Buttons -->
        <div class="action-buttons">
            <div class="action-btn" id="infoBtn" title="Novel Info">
                <i class="fas fa-info-circle"></i>
            </div>
            <div class="action-btn" id="favBtn" title="Favorites">
                <i class="fas fa-heart"></i>
            </div>
            <div class="action-btn" id="githubBtn" title="GitHub">
                <i class="fab fa-github"></i>
            </div>
        </div>
        
        <!-- Favorite Panel -->
        <div class="favorite-panel" id="favPanel">
            <div class="favorite-panel-header">
                <h4>
                    <i class="fas fa-heart"></i>
                    Favorites
                </h4>
            </div>
            <div class="favorite-panel-content" id="favList">
                <div class="no-favorites">
                    <i class="fas fa-heart-broken"></i>
                    <p>No favorites yet</p>
                </div>
            </div>
        </div>
        
        <!-- Novel Info Panel -->
        <div class="novel-info" id="novelInfo">
            <div class="novel-info-header">
                <h4>
                    <i class="fas fa-info-circle"></i>
                    <span id="infoTitle">Novel Info</span>
                </h4>
            </div>
            <div class="novel-info-content" id="infoContent">
                Loading...
            </div>
        </div>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <i class="fas fa-spinner"></i>
        <span>Loading...</span>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- Modal Overlay -->
    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon warning">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h3 class="modal-title" id="modalTitle">Confirm</h3>
            </div>
            <div class="modal-body" id="modalBody">
                Are you sure?
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
                <button class="modal-btn confirm" id="modalConfirm">Confirm</button>
            </div>
        </div>
    </div>
    
    <script src="../js/novel.js"></script>
</body>

</html>
