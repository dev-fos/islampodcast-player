<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Play Game - Easy Web TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Zhang Boheng">
    <meta name="keywords" content="iptv, movie, github, online tv, web tv, series tv, games">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="../css/main.css" rel="stylesheet" />
    <script src="../js/jquery-3.6.0.min.js"></script>
    <style>
        /* Reset main.css conflicts */
        .gameplay-container,
        .gameplay-container * {
            float: none !important;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background-image: url("../images/bg.jpg");
            background-size: cover;
            background-attachment: fixed;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        /* Main Container */
        .gameplay-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Top Header */
        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(163,0,27,0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .header-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.05);
        }
        
        .header-btn i {
            color: #a3001b;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        
        .header-btn:hover i {
            color: #fff;
        }
        
        .header-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-title i {
            color: #a3001b;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Control Buttons */
        .control-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .control-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: translateY(-2px);
        }
        
        .control-btn i {
            color: #a3001b;
            transition: color 0.3s ease;
        }
        
        .control-btn:hover i {
            color: #fff;
        }
        
        .control-btn.primary {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
        }
        
        .control-btn.primary i {
            color: #fff;
        }
        
        .control-btn.primary:hover {
            background: linear-gradient(135deg, #8a0016 0%, #6a0012 100%);
            box-shadow: 0 5px 20px rgba(163,0,27,0.4);
        }
        
        /* Game Info */
        .game-info {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 15px;
            border-left: 2px solid rgba(163,0,27,0.3);
            margin-left: 10px;
        }
        
        .game-info .game-name {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }
        
        .game-info .game-category {
            background: rgba(163,0,27,0.2);
            padding: 4px 10px;
            border-radius: 8px;
            color: #a3001b;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        /* Game Frame Container */
        .game-frame-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: calc(100vh - 60px);
            background: rgba(0,0,0,0.3);
        }
        
        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            display: block;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        
        .loading-overlay.hidden {
            display: none;
        }
        
        .loading-spinner {
            text-align: center;
            color: #fff;
        }
        
        .loading-spinner i {
            font-size: 48px;
            color: #a3001b;
            animation: spin 1s linear infinite;
        }
        
        .loading-spinner p {
            margin-top: 15px;
            font-size: 16px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Fullscreen Mode */
        .gameplay-container.fullscreen .top-header {
            opacity: 0;
            transform: translateY(-100%);
            transition: all 0.3s ease;
        }
        
        .gameplay-container.fullscreen .game-frame-container {
            margin-top: 0;
        }
        
        .gameplay-container.fullscreen:hover .top-header {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Responsive */
        @media screen and (max-width: 768px) {
            .top-header {
                height: 50px;
                padding: 0 10px;
            }
            
            .header-title {
                font-size: 14px;
            }
            
            .game-info {
                display: none;
            }
            
            .control-btn {
                padding: 8px 12px;
                font-size: 12px;
            }
            
            .control-btn span {
                display: none;
            }
            
            .game-frame-container {
                top: 50px;
                height: calc(100vh - 50px);
            }
        }
        
        @media screen and (max-width: 480px) {
            .header-btn {
                width: 35px;
                height: 35px;
            }
            
            .header-btn i {
                font-size: 14px;
            }
            
            .control-btn {
                padding: 6px 10px;
            }
        }
        
        /* Hide old elements */
        #left, #right, #div1, #control, #menuicon, #player, #prev, .toggle, .itemContainer, .hiddens, .loadingimg, .ready-player-1, audio {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="gameplay-container" id="gameplayContainer">
        <!-- Top Header -->
        <header class="top-header">
            <div class="header-left">
                <div class="header-btn" id="backBtn" title="Back to Games">
                    <i class="fas fa-arrow-left"></i>
                </div>
                <div class="header-btn" id="homeBtn" title="Home">
                    <i class="fas fa-home"></i>
                </div>
                <div class="header-title">
                    <i class="fas fa-gamepad"></i>
                    <span id="gameTitle">Loading...</span>
                </div>
            </div>
            <div class="header-right">
                <div class="game-info" id="gameInfo">
                    <span class="game-category" id="gameCategory">-</span>
                </div>
                <button class="control-btn" id="restartBtn" title="Restart Game">
                    <i class="fas fa-redo"></i>
                    <span>Restart</span>
                </button>
                <button class="control-btn" id="fullscreenBtn" title="Fullscreen">
                    <i class="fas fa-expand"></i>
                    <span>Fullscreen</span>
                </button>
            </div>
        </header>
        
        <!-- Game Frame Container -->
        <div class="game-frame-container">
            <iframe id="gameFrame" class="game-frame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
            
        </div>
    </div>
    
    <script src="../js/togameplay.js"></script>
</body>

</html>
