<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Music - Easy Web TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Zhang Boheng">
    <meta name="keywords" content="iptv, movie, github, online tv, web tv, series tv, music">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="../css/main.css" rel="stylesheet" />
    <script src="../js/jquery-3.6.0.min.js"></script>
    <style>
        /* Reset main.css conflicts */
        .app-container,
        .app-container * {
            float: none !important;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background-image: url("../images/bg.jpg");
            background-size: cover;
            background-attachment: fixed;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        /* Main Container */
        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Top Header */
        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(163,0,27,0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .header-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.05);
        }
        
        .header-btn i {
            color: #a3001b;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        
        .header-btn:hover i {
            color: #fff;
        }
        
        .header-title {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-title i {
            color: #a3001b;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        /* Search Box */
        .search-box {
            position: relative;
        }
        
        .search-box input {
            width: 250px;
            padding: 10px 40px 10px 15px;
            border: 2px solid rgba(163,0,27,0.3);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            border-color: #a3001b;
            background: rgba(255,255,255,0.15);
            width: 300px;
        }
        
        .search-box input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .search-box .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            bottom: 0;
            width: 250px;
            height: calc(100vh - 70px);
            background: rgba(0,0,0,0.85);
            border-right: 2px solid rgba(163,0,27,0.5);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 90;
            overflow-y: auto;
        }
        
        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }
        
        /* Toggle Sidebar Button */
        .toggle-sidebar {
            position: fixed;
            left: 250px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(163,0,27,0.5);
            border-left: none;
            border-radius: 0 10px 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .toggle-sidebar:hover {
            background: rgba(163,0,27,0.3);
        }
        
        .toggle-sidebar i {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        
        .sidebar.collapsed .toggle-sidebar {
            left: 0;
        }
        
        .sidebar.collapsed .toggle-sidebar i {
            transform: rotate(180deg);
        }
        
        .sidebar-header {
            padding: 20px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
        }
        
        .sidebar-header h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sidebar-header h3 i {
            color: #a3001b;
        }
        
        .category-list {
            padding: 15px 0;
        }
        
        .category-item {
            padding: 12px 20px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid transparent;
        }
        
        .category-item:hover {
            background: rgba(163,0,27,0.15);
            color: #fff;
            border-left-color: rgba(163,0,27,0.5);
        }
        
        .category-item.active {
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            color: #fff;
            border-left-color: #a3001b;
        }
        
        .category-item i {
            color: #a3001b;
            width: 20px;
            text-align: center;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            height: 0;
            margin-left: 250px;
            margin-top: 70px;
            padding: 20px;
            overflow-y: auto;
            transition: margin-left 0.3s ease;
        }
        
        .main-content.expanded {
            margin-left: 0;
        }
        
        .main-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .main-content::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .main-content::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 4px;
        }
        
        /* Artist Grid */
        .artist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        
        .artist-card {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .artist-card:hover {
            transform: translateY(-5px);
            border-color: rgba(163,0,27,0.5);
            box-shadow: 0 10px 30px rgba(163,0,27,0.2);
        }
        
        .artist-card .artist-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .artist-card:hover .artist-image {
            transform: scale(1.05);
        }
        
        .artist-card .artist-info {
            padding: 15px;
            text-align: center;
        }
        
        .artist-card .artist-name {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .artist-card .artist-alias {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .loading-overlay.hidden {
            display: none;
        }
        
        .loading-spinner {
            text-align: center;
            color: #fff;
        }
        
        .loading-spinner i {
            font-size: 48px;
            color: #a3001b;
            animation: spin 1s linear infinite;
        }
        
        .loading-spinner p {
            margin-top: 15px;
            font-size: 14px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Load More Indicator */
        .load-more {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
        }
        
        .load-more i {
            font-size: 24px;
            color: #a3001b;
            animation: spin 1s linear infinite;
        }
        
        /* No Results */
        .no-results {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
        }
        
        .no-results i {
            font-size: 64px;
            color: rgba(163,0,27,0.3);
            margin-bottom: 20px;
        }
        
        .no-results p {
            font-size: 16px;
        }
        
        /* Responsive */
        @media screen and (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }
            
            .toggle-sidebar {
                left: 200px;
            }
            
            .main-content {
                margin-left: 200px;
            }
            
            .search-box input {
                width: 200px;
            }
            
            .search-box input:focus {
                width: 200px;
            }
        }
        
        @media screen and (max-width: 768px) {
            .sidebar {
                width: 0;
                border-right: none;
            }
            
            .sidebar.show-mobile {
                width: 250px;
                border-right: 2px solid rgba(163,0,27,0.5);
            }
            
            .toggle-sidebar {
                left: 0;
            }
            
            .sidebar.show-mobile .toggle-sidebar {
                left: 250px;
            }
            
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            
            .header-title {
                font-size: 16px;
            }
            
            .top-header {
                flex-wrap: wrap;
                height: auto;
                padding: 10px 15px;
            }
            
            .header-left {
                order: 1;
            }
            
            .header-right {
                order: 2;
                width: 100%;
                margin-top: 10px;
            }
            
            .search-box {
                width: 100%;
            }
            
            .search-box input {
                width: 100%;
            }
            
            .search-box input:focus {
                width: 100%;
            }
            
            .artist-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .artist-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .artist-card .artist-info {
                padding: 10px;
            }
            
            .artist-card .artist-name {
                font-size: 12px;
            }
        }
        
        /* Bottom Player */
        .bottom-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 2px solid rgba(163,0,27,0.5);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        
        .bottom-player.show {
            transform: translateY(0);
        }
        
        .player-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            min-width: 200px;
        }
        
        .player-cover {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid rgba(163,0,27,0.5);
        }
        
        .player-info {
            flex: 1;
            min-width: 0;
        }
        
        .player-song-name {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-artist-name {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 2;
            max-width: 600px;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 8px;
        }
        
        .player-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .player-btn:hover {
            background: rgba(163,0,27,0.3);
        }
        
        .player-btn i {
            color: #fff;
            font-size: 14px;
        }
        
        .player-btn.play-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
        }
        
        .player-btn.play-btn:hover {
            transform: scale(1.1);
        }
        
        .player-btn.play-btn i {
            font-size: 18px;
        }
        
        .player-progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .player-time {
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            min-width: 40px;
        }
        
        .player-progress {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        
        .player-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #a3001b, #ff3355);
            border-radius: 2px;
            width: 0%;
            position: relative;
        }
        
        .player-progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .player-progress:hover .player-progress-bar::after {
            opacity: 1;
        }
        
        .player-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            justify-content: flex-end;
            min-width: 150px;
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .volume-control i {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            cursor: pointer;
        }
        
        .volume-slider {
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        
        .volume-bar {
            height: 100%;
            background: #a3001b;
            border-radius: 2px;
            width: 70%;
        }
        
        .player-close {
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .player-close:hover {
            background: rgba(255,0,0,0.3);
        }
        
        .player-close i {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
        
        /* Song Card Play Button */
        .song-card {
            position: relative;
        }
        
        .song-card .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            aspect-ratio: 1;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .song-card:hover .play-overlay {
            opacity: 1;
        }
        
        .play-overlay i {
            font-size: 40px;
            color: #fff;
        }
        
        /* Main content padding when player is shown */
        .main-content.with-player {
            padding-bottom: 100px;
        }
        
        /* Hide old elements */
        #left, #right, #div1, #control, #menuicon, #player, #prev, .toggle, .itemContainer, .ready-player-1, audio {
            display: none !important;
        }
        
        /* Responsive for player */
        @media screen and (max-width: 768px) {
            .player-left {
                min-width: 100px;
            }
            
            .player-info {
                display: none;
            }
            
            .player-center {
                flex: 1;
                max-width: none;
            }
            
            .player-right {
                min-width: auto;
            }
            
            .volume-control {
                display: none;
            }
            
            .player-time {
                font-size: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Top Header -->
        <header class="top-header">
            <div class="header-left">
                <div class="header-btn" id="backBtn" title="Back">
                    <i class="fas fa-arrow-left"></i>
                </div>
                <div class="header-btn" id="menuBtn" title="Menu">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="header-title">
                    <i class="fas fa-music"></i>
                    <span>Music</span>
                </div>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search artists or songs...">
                    <i class="fas fa-search search-icon" id="searchBtn"></i>
                </div>
            </div>
        </header>
        
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- Toggle Button -->
            <div class="toggle-sidebar" id="toggleSidebar">
                <i class="fas fa-chevron-left"></i>
            </div>
            <div class="category-list" id="categoryList">
                <div class="category-item active" data-type="all" data-value="-1">
                    <i class="fas fa-globe"></i>
                    <span>All Artists</span>
                </div>
                <div class="category-item" data-type="area" data-value="7">
                    <i class="fas fa-flag"></i>
                    <span>Chinese</span>
                </div>
                <div class="category-item" data-type="area" data-value="96">
                    <i class="fas fa-globe-americas"></i>
                    <span>Western</span>
                </div>
                <div class="category-item" data-type="area" data-value="8">
                    <i class="fas fa-flag"></i>
                    <span>Japanese</span>
                </div>
                <div class="category-item" data-type="area" data-value="16">
                    <i class="fas fa-flag"></i>
                    <span>Korean</span>
                </div>
                <div class="category-item" data-type="type" data-value="1">
                    <i class="fas fa-male"></i>
                    <span>Male Artists</span>
                </div>
                <div class="category-item" data-type="type" data-value="2">
                    <i class="fas fa-female"></i>
                    <span>Female Artists</span>
                </div>
                <div class="category-item" data-type="type" data-value="3">
                    <i class="fas fa-users"></i>
                    <span>Bands</span>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <div class="artist-grid" id="artistGrid">
                <!-- Artists will be loaded here -->
            </div>
            <div class="load-more" id="loadMore" style="display: none;">
                <i class="fas fa-spinner"></i>
                <p>Loading more...</p>
            </div>
        </main>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner">
                <i class="fas fa-spinner"></i>
                <p>Loading artists...</p>
            </div>
        </div>
        
        <!-- Bottom Player -->
        <div class="bottom-player" id="bottomPlayer">
            <div class="player-left">
                <img class="player-cover" id="playerCover" src="../images/noimage.jpeg" alt="Cover">
                <div class="player-info">
                    <div class="player-song-name" id="playerSongName">No song playing</div>
                    <div class="player-artist-name" id="playerArtistName">-</div>
                </div>
            </div>
            <div class="player-center">
                <div class="player-controls">
                    <button class="player-btn" id="prevBtn" title="Previous">
                        <i class="fas fa-step-backward"></i>
                    </button>
                    <button class="player-btn play-btn" id="playPauseBtn" title="Play/Pause">
                        <i class="fas fa-play" id="playIcon"></i>
                    </button>
                    <button class="player-btn" id="nextBtn" title="Next">
                        <i class="fas fa-step-forward"></i>
                    </button>
                </div>
                <div class="player-progress-container">
                    <span class="player-time" id="currentTime">0:00</span>
                    <div class="player-progress" id="progressBar">
                        <div class="player-progress-bar" id="progressFill"></div>
                    </div>
                    <span class="player-time" id="totalTime">0:00</span>
                </div>
            </div>
            <div class="player-right">
                <div class="volume-control">
                    <i class="fas fa-volume-up" id="volumeIcon"></i>
                    <div class="volume-slider" id="volumeSlider">
                        <div class="volume-bar" id="volumeBar"></div>
                    </div>
                </div>
                <button class="player-close" id="closePlayerBtn" title="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        
        <!-- Hidden Audio Element -->
        <audio id="audioPlayer" style="display: none;"></audio>
    </div>
    
    <script src="../js/tomusic.js"></script>
</body>

</html>
