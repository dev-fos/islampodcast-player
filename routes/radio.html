<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Radio Stations - Easy Web TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Zhang Boheng">
    <meta name="keywords" content="iptv, movie, github, online tv, web tv, series tv, radio, music">
    <link href="../css/main.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 重置 main.css 的全局样式冲突 */
        .radio-container,
        .radio-container * {
            float: none !important;
        }
        
        #left {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background-image: url("../images/bg.jpg");
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Main Container */
        .radio-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
        }
        
        /* Header Section */
        .radio-header {
            background: linear-gradient(90deg, rgba(163,0,27,0.15) 0%, rgba(163,0,27,0.08) 100%);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 1px solid rgba(163,0,27,0.3);
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }
        
        .radio-header h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .radio-header h1 i {
            color: #a3001b;
            font-size: 28px;
        }
        
        .radio-header .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-left: 5px;
        }
        
        /* Search Box */
        .search-container {
            position: relative;
            width: 250px;
            flex-shrink: 0;
        }
        
        .search-container input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid rgba(163,0,27,0.3);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-container input:focus {
            border-color: #a3001b;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 20px rgba(163,0,27,0.3);
        }
        
        .search-container input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 16px;
        }
        
        /* Tab Navigation - in header */
        .tab-nav {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .tab-btn {
            padding: 10px 18px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .tab-btn i {
            font-size: 18px;
            transition: all 0.3s ease;
        }
        
        .tab-btn:hover:not(.active) {
            background: rgba(163,0,27,0.1);
            border-color: rgba(163,0,27,0.3);
            color: #fff;
            transform: translateY(-2px);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            color: #fff;
            box-shadow: 0 5px 20px rgba(163,0,27,0.4);
            transform: translateY(-2px);
        }
        
        .tab-btn.active i {
            color: #fff;
        }
        
        /* Tab Content Area */
        .tab-content-wrapper {
            flex: 1;
            overflow: hidden;
            padding: 20px 30px;
        }
        
        .tab-content {
            display: none;
            height: 100%;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Section Title */
        .section-title {
            color: #fff;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 20px;
            padding: 0;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            color: #a3001b;
        }
        
        .section-title .count {
            background: rgba(163,0,27,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #a3001b;
        }
        
        /* Grid Layout for Items - Full Screen Tile */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            overflow-y: auto;
            padding: 15px;
            height: calc(100vh - 120px);
            position: relative;
        }
        
        /* Custom Scrollbar */
        .items-grid::-webkit-scrollbar {
            width: 8px;
        }
        
        .items-grid::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        
        .items-grid::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 10px;
        }
        
        .items-grid::-webkit-scrollbar-thumb:hover {
            background: #a3001b;
        }
        
        /* Item Card */
        .item-card {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #a3001b, transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .item-card:hover {
            background: rgba(163,0,27,0.1);
            border-color: rgba(163,0,27,0.3);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 30px rgba(163,0,27,0.2);
        }
        
        .item-card:hover::before {
            opacity: 1;
        }
        
        .item-card a {
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s ease;
            line-height: 1.3;
            text-align: center;
            max-width: 100%;
            word-break: break-word;
        }
        
        .item-card:hover a {
            color: #a3001b;
        }
        
        .item-card .card-icon {
            font-size: 28px;
            color: rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .item-card:hover .card-icon {
            color: #a3001b;
            transform: scale(1.2);
        }
        
        .item-card .station-count {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            background: rgba(163,0,27,0.2);
            padding: 3px 8px;
            border-radius: 10px;
            margin-top: 5px;
        }
        
        /* Category specific colors */
        .item-card[data-category="news"] .card-icon { color: #e74c3c; }
        .item-card[data-category="sports"] .card-icon { color: #27ae60; }
        .item-card[data-category="music"] .card-icon { color: #9b59b6; }
        .item-card[data-category="pop"] .card-icon { color: #f39c12; }
        .item-card[data-category="rock"] .card-icon { color: #e74c3c; }
        .item-card[data-category="jazz"] .card-icon { color: #3498db; }
        .item-card[data-category="classical"] .card-icon { color: #1abc9c; }
        .item-card[data-category="talk"] .card-icon { color: #9b59b6; }
        
        /* Back Button - in header */
        .back-btn {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 36px !important;
            height: 36px !important;
            background: rgba(255,255,255,0.15) !important;
            border: 2px solid rgba(163,0,27,0.6) !important;
            border-radius: 8px !important;
            cursor: pointer !important;
            transition: all 0.3s ease !important;
            flex-shrink: 0 !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .back-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%) !important;
            border-color: #a3001b !important;
            transform: scale(1.05) !important;
        }
        
        .back-btn i {
            color: #a3001b !important;
            font-size: 18px !important;
            transition: color 0.3s ease !important;
        }
        
        .back-btn:hover i {
            color: #fff !important;
        }
        
        /* No Results Message */
        .no-results {
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 50px;
            font-size: 16px;
        }
        
        .no-results i {
            font-size: 48px;
            margin-bottom: 20px;
            color: rgba(163,0,27,0.3);
        }
        
        /* Responsive Design */
        @media screen and (max-width: 1200px) {
            .items-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
        
        @media screen and (max-width: 768px) {
            .radio-header {
                padding: 12px 15px;
                flex-direction: column;
                gap: 10px;
            }
            
            .radio-header h1 {
                font-size: 18px;
                order: 1;
            }
            
            .search-container {
                width: 100%;
                max-width: 100%;
                order: 2;
            }
            
            .tab-nav {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
                order: 3;
            }
            
            .tab-btn {
                padding: 8px 12px;
                font-size: 12px;
            }
            
            .tab-content-wrapper {
                padding: 10px;
            }
            
            .items-grid {
                grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
                gap: 8px;
                height: calc(100vh - 200px);
            }
            
            .item-card {
                padding: 10px 6px;
            }
            
            .item-card .card-icon {
                font-size: 22px;
                margin-bottom: 6px;
            }
            
            .item-card a {
                font-size: 11px;
            }
            
            .item-card .station-count {
                font-size: 10px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .items-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 6px;
            }
            
            .item-card {
                padding: 8px 4px;
            }
            
            .item-card .card-icon {
                font-size: 20px;
                margin-bottom: 4px;
            }
            
            .item-card a {
                font-size: 10px;
            }
            
            .tab-btn {
                padding: 8px 10px;
                font-size: 11px;
            }
            
            .tab-btn i {
                font-size: 14px;
            }
        }
        
        /* Hide old elements */
        #left, #right, #div1 {
            display: none !important;
        }
        
        /* Loading Animation */
        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #a3001b;
        }
        
        .loading-spinner i {
            font-size: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Flag Icon Style */
        .flag-icon {
            font-size: 32px;
            line-height: 1;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="radio-container">
        <!-- Header with Tabs -->
        <header class="radio-header">
            <h1>
                <div class="back-btn" id="backBtn">
                    <i class="fas fa-arrow-left"></i>
                </div>
                <i class="fas fa-broadcast-tower"></i>
                Radio Stations
                <span class="subtitle">28000+ stations</span>
            </h1>
            <!-- Tab Navigation in Header -->
            <nav class="tab-nav">
                <div class="tab-btn active" data-tab="countries">
                    <i class="fas fa-globe"></i>
                    Countries
                </div>
                <div class="tab-btn" data-tab="languages">
                    <i class="fas fa-language"></i>
                    Languages
                </div>
                <div class="tab-btn" data-tab="category">
                    <i class="fas fa-tags"></i>
                    Category
                </div>
            </nav>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search stations...">
            </div>
        </header>
        
        <!-- Tab Content Wrapper -->
        <div class="tab-content-wrapper">
            <!-- Countries Tab -->
            <div class="tab-content active" id="countries">
                <div class="items-grid" id="countries-grid">
                    <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
                </div>
            </div>
            
            <!-- Languages Tab -->
            <div class="tab-content" id="languages">
                <div class="items-grid" id="languages-grid">
                    <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
                </div>
            </div>
            
            <!-- Category Tab -->
            <div class="tab-content" id="category">
                <div class="items-grid" id="category-grid">
                    <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/toradio.js"></script>
</body>

</html>
