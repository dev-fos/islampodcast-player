<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Adult - Easy Web TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Zhang Boheng">
    <meta name="keywords" content="iptv, movie, github, online tv, web tv, series tv...">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="../css/main.css" rel="stylesheet" />
    
    <style>
        /* Reset main.css conflicts */
        .container,
        .container * {
            float: none !important;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background-image: url("../images/bg.jpg");
            background-size: cover;
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        /* Main Container */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            background: rgba(0,0,0,0.85);
            border-bottom: 2px solid rgba(163,0,27,0.5);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            z-index: 100;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.05);
        }
        
        .back-btn i {
            color: #a3001b;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        
        .back-btn:hover i {
            color: #fff;
        }
        
        .header-title {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-title i {
            color: #a3001b;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        /* Search Box */
        .search-box {
            position: relative;
        }
        
        .search-input {
            width: 250px;
            padding: 10px 15px 10px 40px;
            border: 2px solid rgba(163,0,27,0.3);
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            border-color: #a3001b;
            background: rgba(255,255,255,0.15);
            width: 300px;
        }
        
        .search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        /* Source Select */
        .source-select {
            padding: 10px 15px;
            border: 2px solid rgba(163,0,27,0.3);
            border-radius: 10px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .source-select:focus {
            border-color: #a3001b;
        }
        
        .source-select option {
            background: rgba(0,0,0,0.9);
            color: #fff;
        }
        
        /* Main Content Area */
        .main-content {
            display: flex;
            flex: 1;
            height: 0;
            margin-top: 70px;
            position: relative;
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100%;
            background: rgba(0,0,0,0.85);
            border-right: 2px solid rgba(163,0,27,0.5);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: fixed;
            top: 70px;
            bottom: 0;
            z-index: 50;
            overflow: hidden;
        }
        
        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }
        
        .sidebar-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
        }
        
        .sidebar-header h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sidebar-header h3 i {
            color: #a3001b;
        }
        
        .category-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .category-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .category-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .category-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 3px;
        }
        
        .category-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .category-item:hover {
            background: rgba(163,0,27,0.15);
        }
        
        .category-item.active {
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom-color: #a3001b;
        }
        
        .category-item i {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        .category-item:hover i,
        .category-item.active i {
            color: #a3001b;
        }
        
        .category-item span {
            color: #fff;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Toggle Sidebar Button */
        .toggle-sidebar {
            position: fixed;
            left: 250px;
            top: calc(70px + 50%);
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(163,0,27,0.5);
            border-left: none;
            border-radius: 0 10px 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 60;
        }
        
        .toggle-sidebar:hover {
            background: rgba(163,0,27,0.3);
        }
        
        .toggle-sidebar i {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        
        .sidebar.collapsed .toggle-sidebar {
            left: 0;
        }
        
        .sidebar.collapsed .toggle-sidebar i {
            transform: rotate(180deg);
        }
        
        /* Content Grid */
        .content-area {
            flex: 1;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
            margin-left: 250px;
        }
        
        .sidebar.collapsed + .content-area,
        .sidebar.collapsed ~ .content-area {
            margin-left: 0;
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            min-height: 100%;
            position: relative;
        }
        
        .content-grid.has-results {
            position: static;
        }
        
        /* Card Item */
        .card-item {
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(163,0,27,0.3);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            text-decoration: none;
            display: block;
        }
        
        .card-item:hover {
            border-color: #a3001b;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(163,0,27,0.3);
        }
        
        .card-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .card-item:hover .card-image {
            transform: scale(1.05);
        }
        
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.9) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .card-item:hover .card-overlay {
            opacity: 1;
        }
        
        .card-info {
            padding: 15px;
            position: relative;
        }
        
        .card-type {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(163,0,27,0.2);
            border-radius: 8px;
            color: #a3001b;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .card-title {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0;
        }
        
        .card-play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .card-item:hover .card-play-icon {
            opacity: 1;
        }
        
        .card-play-icon i {
            color: #fff;
            font-size: 20px;
        }
        
        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
        }
        
        .loading-state i {
            font-size: 40px;
            color: #a3001b;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
        }
        
        .empty-state i {
            font-size: 60px;
            color: rgba(163,0,27,0.3);
            margin-bottom: 20px;
        }
        
        .empty-state p {
            font-size: 16px;
        }
        
        /* Load More Indicator */
        .load-more-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: rgba(255,255,255,0.7);
            gap: 10px;
        }
        
        .load-more-indicator i {
            font-size: 20px;
            color: #a3001b;
            animation: spin 1s linear infinite;
        }
        
        .load-more-indicator span {
            font-size: 14px;
        }
        
        /* Responsive Design */
        @media screen and (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }
            
            .toggle-sidebar {
                left: 200px;
            }
            
            .content-area {
                margin-left: 200px;
            }
            
            .search-input {
                width: 200px;
            }
            
            .search-input:focus {
                width: 250px;
            }
            
            .content-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }
        
        @media screen and (max-width: 768px) {
            .sidebar {
                width: 0;
                border-right: none;
            }
            
            .sidebar.show-mobile {
                width: 250px;
                border-right: 2px solid rgba(163,0,27,0.5);
            }
            
            .content-area {
                margin-left: 0;
            }
            
            .toggle-sidebar {
                left: 0;
            }
            
            .sidebar.show-mobile .toggle-sidebar {
                left: 250px;
            }
            
            .header-title {
                font-size: 16px;
            }
            
            .search-input {
                width: 150px;
            }
            
            .search-input:focus {
                width: 200px;
            }
            
            .source-select {
                padding: 8px 10px;
                font-size: 12px;
            }
            
            .content-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            
            .card-image {
                height: 120px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .header {
                padding: 10px 15px;
                flex-wrap: wrap;
                height: auto;
            }
            
            .back-btn {
                width: 35px;
                height: 35px;
            }
            
            .header-left {
                order: 1;
            }
            
            .header-right {
                order: 2;
                width: 100%;
                gap: 10px;
                margin-top: 10px;
            }
            
            .search-box {
                flex: 1;
            }
            
            .search-input {
                width: 100%;
            }
            
            .search-input:focus {
                width: 100%;
            }
            
            .content-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .card-info {
                padding: 10px;
            }
            
            .card-title {
                font-size: 12px;
            }
        }
        
        /* Hide old elements */
        #left, #right, #div1, #control, #menuicon, #player, #prev, #github, #favorite, #channelist, #shuffleplay, #inputlink, .toggle, #root, .itemContainer, .hiddens, .loadingimg {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="back-btn" id="backBtn" title="Back">
                    <i class="fas fa-arrow-left"></i>
                </div>
                <div class="back-btn" id="menuBtn" title="Toggle Menu">
                    <i class="fas fa-bars"></i>
                </div>
                <h1 class="header-title">
                    <i class="fas fa-heart"></i>
                    <span>Adult</span>
                </h1>
            </div>
            
            <div class="header-right">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search videos...">
                </div>
                <select class="source-select" id="sourceSelect">
                    <!-- Options will be populated by JavaScript from localStorage -->
                </select>
            </div>
        </header>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="category-list" id="categoryList">
                    <div class="loading-state">
                        <i class="fas fa-spinner"></i>
                        <span>Loading categories...</span>
                    </div>
                </div>
                
                <!-- Toggle Button -->
                <div class="toggle-sidebar" id="toggleSidebar">
                    <i class="fas fa-chevron-left"></i>
                </div>
            </aside>
            
            <!-- Content Area -->
            <div class="content-area" id="contentArea">
                <div class="content-grid" id="contentGrid">
                    <div class="loading-state">
                        <i class="fas fa-spinner"></i>
                        <span>Loading videos...</span>
                    </div>
                </div>
                <!-- Load More Indicator -->
                <div class="load-more-indicator" id="loadMoreIndicator" style="display: none;">
                    <i class="fas fa-spinner"></i>
                    <span>加载更多...</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/toadult.js"></script>
</body>

</html>
